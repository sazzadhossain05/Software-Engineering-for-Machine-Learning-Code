version: "3.8"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    volumes:
      - mlflow_data:/mlflow

  trainer:
    build:
      context: ..
      dockerfile: mlops/Dockerfile
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../results:/app/results
    command: >
      python -m src.pytorch_impl.train
      --config configs/cifar10_pytorch.yaml

volumes:
  mlflow_data:
