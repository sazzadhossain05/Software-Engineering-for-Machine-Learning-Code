name: CI - Lint, Test, Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install black isort flake8
      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements/base.txt -r requirements/pytorch.txt -r requirements/dev.txt
      - run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing -m "not slow"
      - uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  se-analysis:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install radon
      - run: radon cc src/ -a -nc
      - run: radon mi src/ -nc
