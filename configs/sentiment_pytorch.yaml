task: sentiment
framework: pytorch

data:
  name: imdb
  root: ./data
  val_split: 0.1
  max_vocab_size: 10000
  max_seq_length: 256

model:
  name: lstm
  embedding_dim: 128
  lstm_hidden: 128

training:
  batch_size: 128
  epochs: 10
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0
  seed: 42

logging:
  experiment_name: sentiment_pytorch
  run_name: null
  log_every_n_steps: 100
  save_model: true
  model_dir: ./models
