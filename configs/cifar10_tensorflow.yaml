task: cifar10
framework: tensorflow

data:
  name: cifar10
  root: ./data
  val_split: 0.1

model:
  name: cnn
  hidden_sizes: [128, 10]

training:
  batch_size: 128
  epochs: 50
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0
  seed: 42

logging:
  experiment_name: cifar10_tensorflow
  run_name: null
  log_every_n_steps: 100
  save_model: true
  model_dir: ./models
